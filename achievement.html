<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>学习成就 - 我的荣誉殿堂</title>
    <link rel="stylesheet" href="styles/achievement-page.css" />
</head>
<body>
    <!-- 返回按钮 -->
    <a href="clock.html" class="back-button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回时钟
    </a>

    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">
            <span class="title-icon">🏆</span>
            我的荣誉殿堂
            <span class="title-icon">🏆</span>
        </h1>
        <p class="page-subtitle">每一次努力都值得被记录！</p>
    </div>

    <!-- 个人统计卡片 -->
    <div class="stats-container">
        <div class="stat-card level-card">
            <div class="stat-icon-large">⭐</div>
            <div class="stat-info">
                <div class="stat-label">当前等级</div>
                <div class="stat-value large" id="levelDisplay">1</div>
                <div class="stat-sublabel">继续加油！</div>
            </div>
        </div>

        <div class="stat-card exp-card">
            <div class="stat-icon-large">✨</div>
            <div class="stat-info">
                <div class="stat-label">经验值</div>
                <div class="stat-value large" id="expDisplay">0</div>
                <div class="stat-sublabel" id="expNeeded">/ 100</div>
            </div>
        </div>

        <div class="stat-card streak-card">
            <div class="stat-icon-large">🔥</div>
            <div class="stat-info">
                <div class="stat-label">连续天数</div>
                <div class="stat-value large" id="streakDisplay">0</div>
                <div class="stat-sublabel">坚持就是胜利！</div>
            </div>
        </div>

        <div class="stat-card study-card">
            <div class="stat-icon-large">📚</div>
            <div class="stat-info">
                <div class="stat-label">累计学习</div>
                <div class="stat-value large" id="totalStudyDisplay">0</div>
                <div class="stat-sublabel">小时</div>
            </div>
        </div>
    </div>

    <!-- 经验进度条 -->
    <div class="exp-progress-section">
        <div class="exp-label-row">
            <span class="exp-label-left">Lv.<span id="currentLevel">1</span></span>
            <span class="exp-label-center" id="expText">0 / 100</span>
            <span class="exp-label-right">Lv.<span id="nextLevel">2</span></span>
        </div>
        <div class="exp-bar-container">
            <div class="exp-bar-fill" id="expBarFill"></div>
            <div class="exp-bar-shine"></div>
        </div>
    </div>

    <!-- 今日学习进度 -->
    <div class="today-section">
        <h2 class="section-title">📅 今日学习</h2>
        <div class="today-stats">
            <div class="today-item">
                <span class="today-label">学习时长</span>
                <span class="today-value" id="todayTime">0 分钟</span>
            </div>
            <div class="today-item">
                <span class="today-label">完成番茄钟</span>
                <span class="today-value" id="todayPomodoros">0 个</span>
            </div>
            <div class="today-item">
                <span class="today-label">解锁成就</span>
                <span class="today-value" id="todayAchievements">0 个</span>
            </div>
        </div>
    </div>

    <!-- 成就分类标签 -->
    <div class="achievement-nav">
        <button class="nav-btn active" data-category="all">
            <span class="nav-icon">🎯</span>
            <span class="nav-text">全部成就</span>
            <span class="nav-count" id="countAll">0</span>
        </button>
        <button class="nav-btn" data-category="pomodoro">
            <span class="nav-icon">🍅</span>
            <span class="nav-text">番茄钟</span>
            <span class="nav-count" id="countPomodoro">0</span>
        </button>
        <button class="nav-btn" data-category="studyTime">
            <span class="nav-icon">⏰</span>
            <span class="nav-text">学习时长</span>
            <span class="nav-count" id="countStudyTime">0</span>
        </button>
        <button class="nav-btn" data-category="streak">
            <span class="nav-icon">🔥</span>
            <span class="nav-text">连续学习</span>
            <span class="nav-count" id="countStreak">0</span>
        </button>
        <button class="nav-btn" data-category="special">
            <span class="nav-icon">⭐</span>
            <span class="nav-text">特殊成就</span>
            <span class="nav-count" id="countSpecial">0</span>
        </button>
    </div>

    <!-- 成就展示区 -->
    <div class="achievements-grid" id="achievementsGrid">
        <!-- 成就卡片将通过JavaScript动态生成 -->
    </div>

    <!-- 底部激励语 -->
    <div class="footer-message">
        <p>🌟 每一个成就都是你努力的见证！</p>
        <p>继续加油，成为更好的自己！💪</p>
    </div>

    <script src="scripts/achievement-page.js"></script>
</body>
</html>
