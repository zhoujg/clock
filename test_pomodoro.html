<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        .test-button {
            padding: 10px 20px;
            margin: 5px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .test-button:hover {
            background: #2980b9;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-family: monospace;
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .warning { color: #f39c12; }
    </style>
</head>
<body>
    <h1>🍅 番茄钟功能测试</h1>
    
    <div class="test-section">
        <h2>1. 系统检查</h2>
        <button class="test-button" onclick="checkSystems()">检查系统</button>
        <div id="systemResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 番茄钟按钮测试</h2>
        <button class="test-button" onclick="testPomodoroButton()">测试按钮</button>
        <div id="buttonResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 故事关联测试</h2>
        <button class="test-button" onclick="testStoryLink()">测试关联</button>
        <div id="linkResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 返回主应用</h2>
        <button class="test-button" onclick="location.href='index.html'">返回主页</button>
    </div>

    <script>
        function checkSystems() {
            const result = document.getElementById('systemResult');
            let html = '<h3>系统状态：</h3>';
            
            // 检查主窗口是否打开
            if (window.opener && !window.opener.closed) {
                const mainWindow = window.opener;
                
                html += '<p class="' + (mainWindow.app ? 'success' : 'error') + '">App: ' + (mainWindow.app ? '✓ 存在' : '✗ 不存在') + '</p>';
                html += '<p class="' + (mainWindow.app?.pomodoroTimer ? 'success' : 'error') + '">PomodoroTimer: ' + (mainWindow.app?.pomodoroTimer ? '✓ 存在' : '✗ 不存在') + '</p>';
                html += '<p class="' + (mainWindow.dailyStoriesManager ? 'success' : 'error') + '">DailyStories: ' + (mainWindow.dailyStoriesManager ? '✓ 存在' : '✗ 存在') + '</p>';
                html += '<p class="' + (mainWindow.app?.achievementSystem ? 'success' : 'error') + '">Achievement: ' + (mainWindow.app?.achievementSystem ? '✓ 存在' : '✗ 不存在') + '</p>';
                html += '<p class="' + (mainWindow.app?.forestSystem ? 'success' : 'error') + '">Forest: ' + (mainWindow.app?.forestSystem ? '✓ 存在' : '✗ 不存在') + '</p>';
            } else {
                html += '<p class="warning">⚠️ 请从主应用打开此测试页面</p>';
                html += '<p>在主页面控制台执行：<code>window.open("test_pomodoro.html")</code></p>';
            }
            
            result.innerHTML = html;
        }
        
        function testPomodoroButton() {
            const result = document.getElementById('buttonResult');
            
            if (window.opener && !window.opener.closed) {
                const mainWindow = window.opener;
                const button = mainWindow.document.getElementById('pomodoroToggle');
                const panel = mainWindow.document.getElementById('pomodoroPanel');
                
                let html = '<h3>按钮测试：</h3>';
                html += '<p class="' + (button ? 'success' : 'error') + '">番茄钟按钮: ' + (button ? '✓ 存在' : '✗ 不存在') + '</p>';
                html += '<p class="' + (panel ? 'success' : 'error') + '">番茄钟面板: ' + (panel ? '✓ 存在' : '✗ 不存在') + '</p>';
                
                if (button && panel) {
                    // 尝试点击
                    button.click();
                    setTimeout(() => {
                        const isActive = panel.classList.contains('active');
                        html += '<p class="' + (isActive ? 'success' : 'error') + '">点击测试: ' + (isActive ? '✓ 面板已打开' : '✗ 面板未打开') + '</p>';
                        result.innerHTML = html;
                    }, 100);
                } else {
                    result.innerHTML = html;
                }
            } else {
                result.innerHTML = '<p class="warning">⚠️ 主窗口未打开</p>';
            }
        }
        
        function testStoryLink() {
            const result = document.getElementById('linkResult');
            
            if (window.opener && !window.opener.closed) {
                const mainWindow = window.opener;
                const stories = mainWindow.dailyStoriesManager;
                const pomodoro = mainWindow.app?.pomodoroTimer;
                
                let html = '<h3>关联测试：</h3>';
                
                if (stories && pomodoro) {
                    // 检查关联方法
                    html += '<p class="' + (typeof stories.onPomodoroComplete === 'function' ? 'success' : 'error') + '">onPomodoroComplete方法: ' + (typeof stories.onPomodoroComplete === 'function' ? '✓ 存在' : '✗ 不存在') + '</p>';
                    html += '<p class="' + (typeof stories.linkToPomodoro === 'function' ? 'success' : 'error') + '">linkToPomodoro方法: ' + (typeof stories.linkToPomodoro === 'function' ? '✓ 存在' : '✗ 不存在') + '</p>';
                    html += '<p class="' + (pomodoro.dailyStories ? 'success' : 'warning') + '">番茄钟→故事引用: ' + (pomodoro.dailyStories ? '✓ 已设置' : '⚠️ 未设置（将在500ms后设置）') + '</p>';
                    
                    // 测试数据结构
                    const story = stories.stories[0];
                    html += '<p class="' + ('pomodoroCount' in story ? 'success' : 'error') + '">故事数据结构: ' + ('pomodoroCount' in story ? '✓ 正确' : '✗ 缺少pomodoroCount字段') + '</p>';
                } else {
                    html += '<p class="error">✗ 故事或番茄钟系统未初始化</p>';
                }
                
                result.innerHTML = html;
            } else {
                result.innerHTML = '<p class="warning">⚠️ 主窗口未打开</p>';
            }
        }
        
        // 自动运行系统检查
        window.onload = function() {
            setTimeout(checkSystems, 500);
        };
    </script>
</body>
</html>
