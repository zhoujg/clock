<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌词显示测试</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        .test-panel {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .status {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            font-family: monospace;
        }
        
        /* 励志语样式 */
        .quote-container {
            position: fixed;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            max-width: 80%;
            z-index: 400;
        }
        
        #quoteDisplay {
            opacity: 1;
            transition: opacity 1s ease;
        }
        
        #quoteEnglish {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        #quoteChinese {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        /* 歌词显示区域 */
        .lyrics-display {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.7), transparent);
            padding: 30px 20px 20px;
            z-index: 500;
            pointer-events: none;
            backdrop-filter: blur(10px);
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .lyrics-content {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        
        .lyrics-text {
            font-size: 24px;
            font-weight: 500;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 8px;
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out;
        }
        
        .lyrics-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="test-panel">
        <h1>歌词显示测试页面</h1>
        
        <div>
            <h2>控制按钮</h2>
            <button onclick="showLyrics()">显示歌词</button>
            <button onclick="hideLyrics()">隐藏歌词</button>
            <button onclick="showQuote()">显示励志语</button>
            <button onclick="hideQuote()">隐藏励志语</button>
            <button onclick="toggleLyricsQuote()">切换（歌词↔励志语）</button>
        </div>
        
        <div class="status">
            <h3>当前状态</h3>
            <div id="status">
                歌词显示: <span id="lyricsStatus">未知</span><br>
                励志语显示: <span id="quoteStatus">未知</span>
            </div>
        </div>
        
        <div>
            <h2>说明</h2>
            <ul>
                <li>点击"显示歌词"应该显示歌词并隐藏励志语</li>
                <li>点击"隐藏歌词"应该隐藏歌词并显示励志语</li>
                <li>歌词显示在页面底部</li>
                <li>励志语显示在页面中下部</li>
                <li>两者不应该同时显示</li>
            </ul>
        </div>
    </div>
    
    <!-- 励志语显示区域 -->
    <div class="quote-container">
        <div id="quoteDisplay">
            <div id="quoteEnglish">Every moment is a fresh beginning.</div>
            <div id="quoteChinese">每一刻都是全新的开始。</div>
        </div>
    </div>
    
    <!-- 歌词显示区域 -->
    <div class="lyrics-display" id="lyricsDisplay" style="display: none;">
        <div class="lyrics-content">
            <div class="lyrics-text" id="lyricsText">♪ 测试歌曲名称</div>
            <div class="lyrics-info" id="lyricsInfo">演唱：测试艺术家</div>
        </div>
    </div>
    
    <script>
        function updateStatus() {
            const lyricsDisplay = document.getElementById('lyricsDisplay');
            const quoteContainer = document.querySelector('.quote-container');
            
            const lyricsVisible = window.getComputedStyle(lyricsDisplay).display !== 'none';
            const quoteVisible = window.getComputedStyle(quoteContainer).display !== 'none';
            
            document.getElementById('lyricsStatus').textContent = lyricsVisible ? '✅ 显示' : '❌ 隐藏';
            document.getElementById('quoteStatus').textContent = quoteVisible ? '✅ 显示' : '❌ 隐藏';
            
            document.getElementById('lyricsStatus').style.color = lyricsVisible ? '#4CAF50' : '#f44336';
            document.getElementById('quoteStatus').style.color = quoteVisible ? '#4CAF50' : '#f44336';
        }
        
        function showLyrics() {
            const lyricsDisplay = document.getElementById('lyricsDisplay');
            const quoteContainer = document.querySelector('.quote-container');
            
            lyricsDisplay.style.display = 'block';
            quoteContainer.style.display = 'none';
            
            updateStatus();
            console.log('✅ 显示歌词，隐藏励志语');
        }
        
        function hideLyrics() {
            const lyricsDisplay = document.getElementById('lyricsDisplay');
            const quoteContainer = document.querySelector('.quote-container');
            
            lyricsDisplay.style.display = 'none';
            quoteContainer.style.display = 'block';
            
            updateStatus();
            console.log('✅ 隐藏歌词，显示励志语');
        }
        
        function showQuote() {
            const quoteContainer = document.querySelector('.quote-container');
            quoteContainer.style.display = 'block';
            updateStatus();
            console.log('✅ 显示励志语');
        }
        
        function hideQuote() {
            const quoteContainer = document.querySelector('.quote-container');
            quoteContainer.style.display = 'none';
            updateStatus();
            console.log('✅ 隐藏励志语');
        }
        
        function toggleLyricsQuote() {
            const lyricsDisplay = document.getElementById('lyricsDisplay');
            const quoteContainer = document.querySelector('.quote-container');
            
            const lyricsVisible = window.getComputedStyle(lyricsDisplay).display !== 'none';
            
            if (lyricsVisible) {
                hideLyrics();
            } else {
                showLyrics();
            }
        }
        
        // 初始化状态
        updateStatus();
        
        // 每秒更新一次状态
        setInterval(updateStatus, 1000);
    </script>
</body>
</html>
