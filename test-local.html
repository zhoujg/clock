<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地测试 - 周墨欣时钟</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .test-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 14px;
        }
        .success {
            background: rgba(46, 213, 115, 0.2);
            border-left: 4px solid #2ed573;
        }
        .error {
            background: rgba(255, 71, 87, 0.2);
            border-left: 4px solid #ff4757;
        }
        .warning {
            background: rgba(255, 168, 1, 0.2);
            border-left: 4px solid #ffa801;
        }
        .info {
            background: rgba(52, 152, 219, 0.2);
            border-left: 4px solid #3498db;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 10px 10px 0;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #testResults {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔧 周墨欣时钟 - 本地测试</h1>
        
        <div class="info">
            <strong>ℹ️ 提示</strong><br>
            此页面用于测试应用是否正常运行。请确保使用 HTTP 服务器访问此页面。
        </div>

        <div id="protocolCheck"></div>

        <h2>测试项目</h2>
        <button onclick="runAllTests()">🧪 运行所有测试</button>
        <button onclick="location.href='index.html'">▶️ 打开时钟应用</button>

        <div id="testResults"></div>
    </div>

    <script>
        // 检查协议
        function checkProtocol() {
            const container = document.getElementById('protocolCheck');
            const protocol = window.location.protocol;
            
            if (protocol === 'file:') {
                container.innerHTML = `
                    <div class="error">
                        <strong>⚠️ 错误：使用了 file:// 协议</strong><br>
                        您正在直接打开 HTML 文件。这会导致 CORS 错误。<br>
                        请使用 HTTP 服务器运行应用。<br><br>
                        <strong>解决方案：</strong><br>
                        1. 在终端运行: <code>./start-server.sh</code><br>
                        2. 或者运行: <code>python3 -m http.server 8000</code><br>
                        3. 然后访问: <code>http://localhost:8000/test-local.html</code>
                    </div>
                `;
            } else if (protocol === 'http:' || protocol === 'https:') {
                container.innerHTML = `
                    <div class="success">
                        <strong>✅ 协议检查通过</strong><br>
                        当前使用 ${protocol} 协议，可以正常访问资源。
                    </div>
                `;
            }
        }

        // 测试功能
        async function runAllTests() {
            const results = document.getElementById('testResults');
            results.innerHTML = '<h3>测试结果：</h3>';

            // 测试 1: 检查关键 JS 文件
            await testJSFiles();
            
            // 测试 2: 检查 CSS 文件
            await testCSSFiles();
            
            // 测试 3: 检查音乐文件
            await testMusicFiles();
        }

        async function testJSFiles() {
            const files = [
                'scripts/app.js',
                'scripts/bgmPlayer.js',
                'scripts/pomodoro.js',
                'scripts/animation.js',
                'scripts/background.js'
            ];

            for (const file of files) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    addResult(response.ok, `JavaScript: ${file}`);
                } catch (error) {
                    addResult(false, `JavaScript: ${file} - ${error.message}`);
                }
            }
        }

        async function testCSSFiles() {
            const files = [
                'styles/main.css',
                'styles/bgmPlayer.css',
                'styles/pomodoro.css',
                'styles/controls.css'
            ];

            for (const file of files) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    addResult(response.ok, `CSS: ${file}`);
                } catch (error) {
                    addResult(false, `CSS: ${file} - ${error.message}`);
                }
            }
        }

        async function testMusicFiles() {
            const files = [
                'assets/bgm/The Mass.mp3',
                'assets/bgm/Victory.mp3'
            ];

            for (const file of files) {
                try {
                    const response = await fetch(file, { method: 'HEAD' });
                    addResult(response.ok, `音乐: ${file}`);
                } catch (error) {
                    addResult(false, `音乐: ${file} - ${error.message}`);
                }
            }
        }

        function addResult(success, message) {
            const results = document.getElementById('testResults');
            const div = document.createElement('div');
            div.className = success ? 'status success' : 'status error';
            div.innerHTML = `${success ? '✅' : '❌'} ${message}`;
            results.appendChild(div);
        }

        // 页面加载时检查协议
        checkProtocol();
    </script>
</body>
</html>
