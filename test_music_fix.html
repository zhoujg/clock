<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .test-section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #764ba2;
        }
        .log {
            background: #1a1a1a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #667eea;
            padding-left: 10px;
        }
        .track {
            background: #333;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
        }
        .track:hover {
            background: #444;
        }
        .track.playing {
            background: #667eea;
        }
    </style>
</head>
<body>
    <h1>🎵 音乐播放器测试</h1>
    
    <div class="test-section">
        <h2>1. 加载在线音乐</h2>
        <button onclick="loadJamendoMusic()">加载 Jamendo 音乐</button>
        <button onclick="loadByTag('ambient')">加载 Ambient 音乐</button>
        <button onclick="loadByTag('instrumental')">加载 Instrumental 音乐</button>
        <div id="musicList"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 音乐控制</h2>
        <button onclick="playMusic()">播放</button>
        <button onclick="pauseMusic()">暂停</button>
        <button onclick="stopMusic()">停止</button>
        <div id="currentTrack" style="margin-top: 10px;">
            当前曲目: <span id="trackName">无</span><br>
            艺术家: <span id="artistName">无</span>
        </div>
    </div>
    
    <div class="test-section">
        <h2>3. 调试日志</h2>
        <button onclick="clearLog()">清除日志</button>
        <div id="log" class="log"></div>
    </div>
    
    <audio id="audioPlayer"></audio>
    
    <script src="scripts/jamendoAPI.js"></script>
    <script>
        const jamendoAPI = new JamendoAPI();
        let currentTracks = [];
        let currentIndex = -1;
        const audio = document.getElementById('audioPlayer');
        
        function addLog(message, data = null) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (data) {
                entry.textContent += '\n' + JSON.stringify(data, null, 2);
            }
            log.insertBefore(entry, log.firstChild);
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        async function loadJamendoMusic() {
            try {
                addLog('开始加载 Jamendo 音乐...');
                const tracks = await jamendoAPI.getRandomTracks({ limit: 10 });
                currentTracks = tracks;
                addLog(`✅ 成功加载 ${tracks.length} 首音乐`);
                
                // 显示音乐列表
                const musicList = document.getElementById('musicList');
                musicList.innerHTML = '<h3>音乐列表：</h3>';
                
                tracks.forEach((track, index) => {
                    const div = document.createElement('div');
                    div.className = 'track';
                    div.innerHTML = `
                        <strong>${index + 1}. ${track.name}</strong><br>
                        <small>艺术家: ${track.artist}</small><br>
                        <small>URL: ${track.file ? '✓ 有效' : '✗ 无效'}</small>
                    `;
                    div.onclick = () => playTrack(index);
                    musicList.appendChild(div);
                });
                
            } catch (error) {
                addLog('❌ 加载失败: ' + error.message);
                console.error(error);
            }
        }
        
        async function loadByTag(tag) {
            try {
                addLog(`开始加载 ${tag} 类型音乐...`);
                const tracks = await jamendoAPI.getTracksByTag(tag, 10);
                currentTracks = tracks;
                addLog(`✅ 成功加载 ${tracks.length} 首音乐`);
                
                // 显示音乐列表
                const musicList = document.getElementById('musicList');
                musicList.innerHTML = `<h3>${tag} 音乐列表：</h3>`;
                
                tracks.forEach((track, index) => {
                    const div = document.createElement('div');
                    div.className = 'track';
                    div.innerHTML = `
                        <strong>${index + 1}. ${track.name}</strong><br>
                        <small>艺术家: ${track.artist}</small><br>
                        <small>URL: ${track.file ? '✓ 有效' : '✗ 无效'}</small>
                    `;
                    div.onclick = () => playTrack(index);
                    musicList.appendChild(div);
                });
                
            } catch (error) {
                addLog('❌ 加载失败: ' + error.message);
                console.error(error);
            }
        }
        
        function playTrack(index) {
            if (index < 0 || index >= currentTracks.length) {
                addLog('❌ 无效的索引: ' + index);
                return;
            }
            
            currentIndex = index;
            const track = currentTracks[index];
            
            addLog('准备播放: ' + track.name, {
                file: track.file,
                artist: track.artist
            });
            
            if (!track.file) {
                addLog('❌ 音频URL为空！');
                return;
            }
            
            audio.src = track.file;
            audio.load();
            
            audio.play()
                .then(() => {
                    addLog('✅ 开始播放: ' + track.name);
                    document.getElementById('trackName').textContent = track.name;
                    document.getElementById('artistName').textContent = track.artist;
                    
                    // 更新列表高亮
                    document.querySelectorAll('.track').forEach((div, i) => {
                        div.classList.toggle('playing', i === index);
                    });
                })
                .catch(error => {
                    addLog('❌ 播放失败: ' + error.message);
                    console.error(error);
                });
        }
        
        function playMusic() {
            if (currentIndex >= 0) {
                audio.play()
                    .then(() => addLog('▶️ 继续播放'))
                    .catch(error => addLog('❌ 播放失败: ' + error.message));
            } else {
                addLog('⚠️ 请先选择一首音乐');
            }
        }
        
        function pauseMusic() {
            audio.pause();
            addLog('⏸️ 暂停播放');
        }
        
        function stopMusic() {
            audio.pause();
            audio.currentTime = 0;
            addLog('⏹️ 停止播放');
        }
        
        // 监听音频事件
        audio.addEventListener('error', (e) => {
            addLog('❌ 音频错误: ' + e.message);
            console.error('Audio error:', e);
        });
        
        audio.addEventListener('play', () => {
            addLog('🎵 音频开始播放');
        });
        
        audio.addEventListener('pause', () => {
            addLog('⏸️ 音频暂停');
        });
        
        addLog('测试页面已加载');
    </script>
</body>
</html>
