<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试每日三个故事 - 番茄钟集成</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .test-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }
        .test-button {
            background: #007AFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .test-button:hover {
            background: #0056CC;
        }
        .test-result {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .info { color: #17a2b8; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>测试每日三个故事 - 番茄钟集成</h1>
        
        <div class="test-section">
            <div class="test-title">🔧 系统初始化测试</div>
            <button class="test-button" onclick="testSystemInit()">测试系统初始化</button>
            <div class="test-result" id="initResult"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">📝 故事创建测试</div>
            <button class="test-button" onclick="createTestStory()">创建测试故事</button>
            <div class="test-result" id="storyResult"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">🍅 番茄钟直接启动测试</div>
            <button class="test-button" onclick="testDirectPomodoroStart()">测试直接启动番茄钟</button>
            <div class="test-result" id="pomodoroResult"></div>
        </div>
        
        <div class="test-section">
            <div class="test-title">🔄 完整集成测试</div>
            <button class="test-button" onclick="testFullIntegration()">运行完整集成测试</button>
            <div class="test-result" id="integrationResult"></div>
        </div>
    </div>

    <script>
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const typeClass = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            return `<span class="${typeClass}">[${timestamp}] ${message}</span>\n`;
        }

        function testSystemInit() {
            const resultDiv = document.getElementById('initResult');
            let result = '';
            
            result += log('🔍 检查系统初始化状态...', 'info');
            
            // 检查是否存在必要的全局对象
            const hasApp = typeof window.app !== 'undefined';
            const hasStories = typeof window.dailyStoriesManager !== 'undefined';
            
            result += log(`App系统: ${hasApp ? '✅ 存在' : '❌ 不存在'}`, hasApp ? 'success' : 'error');
            result += log(`故事系统: ${hasStories ? '✅ 存在' : '❌ 不存在'}`, hasStories ? 'success' : 'error');
            
            if (hasApp && window.app.pomodoroTimer) {
                result += log(`番茄钟系统: ✅ 存在`, 'success');
                result += log(`番茄钟工作时长: ${window.app.pomodoroTimer.workDuration}分钟`, 'info');
            } else {
                result += log(`番茄钟系统: ❌ 不存在`, 'error');
            }
            
            if (hasStories) {
                result += log(`故事数据: ${JSON.stringify(window.dailyStoriesManager.stories.length)}个故事`, 'info');
            }
            
            resultDiv.innerHTML = result;
        }

        function createTestStory() {
            const resultDiv = document.getElementById('storyResult');
            let result = '';
            
            result += log('📝 创建测试故事...', 'info');
            
            if (typeof window.dailyStoriesManager === 'undefined') {
                result += log('❌ 故事系统未找到', 'error');
                resultDiv.innerHTML = result;
                return;
            }
            
            try {
                // 设置第一个故事的内容
                const story = window.dailyStoriesManager.stories[0];
                story.title = '测试番茄钟集成功能';
                story.story = '验证从故事直接启动25分钟番茄钟的功能是否正常工作';
                story.value = '学习';
                
                // 保存并更新UI
                window.dailyStoriesManager.saveTodayStories();
                window.dailyStoriesManager.updateUI();
                
                result += log('✅ 测试故事创建成功', 'success');
                result += log(`标题: ${story.title}`, 'info');
                result += log(`描述: ${story.story}`, 'info');
                result += log(`价值观: ${story.value}`, 'info');
                
            } catch (error) {
                result += log(`❌ 创建故事失败: ${error.message}`, 'error');
            }
            
            resultDiv.innerHTML = result;
        }

        function testDirectPomodoroStart() {
            const resultDiv = document.getElementById('pomodoroResult');
            let result = '';
            
            result += log('🍅 测试直接启动番茄钟...', 'info');
            
            if (typeof window.dailyStoriesManager === 'undefined') {
                result += log('❌ 故事系统未找到', 'error');
                resultDiv.innerHTML = result;
                return;
            }
            
            if (typeof window.app === 'undefined' || !window.app.pomodoroTimer) {
                result += log('❌ 番茄钟系统未找到', 'error');
                resultDiv.innerHTML = result;
                return;
            }
            
            try {
                // 确保故事有标题
                const story = window.dailyStoriesManager.stories[0];
                if (!story.title) {
                    story.title = '测试番茄钟启动';
                    window.dailyStoriesManager.saveTodayStories();
                }
                
                result += log('🔧 准备启动番茄钟...', 'info');
                
                // 模拟点击番茄钟按钮（调用linkToPomodoro方法）
                window.dailyStoriesManager.linkToPomodoro(0);
                
                // 检查番茄钟状态
                const pomodoro = window.app.pomodoroTimer;
                const isRunning = pomodoro.isRunning;
                const timeRemaining = pomodoro.timeRemaining;
                const currentMode = pomodoro.currentMode;
                
                result += log(`番茄钟状态: ${isRunning ? '✅ 运行中' : '❌ 未运行'}`, isRunning ? 'success' : 'error');
                result += log(`当前模式: ${currentMode}`, 'info');
                result += log(`剩余时间: ${Math.floor(timeRemaining / 60)}分${timeRemaining % 60}秒`, 'info');
                result += log(`关联故事索引: ${window.dailyStoriesManager.currentLinkedStoryIndex}`, 'info');
                
                if (isRunning && currentMode === 'work' && timeRemaining === 25 * 60) {
                    result += log('🎉 测试成功！番茄钟已直接启动25分钟工作模式', 'success');
                } else {
                    result += log('⚠️ 测试未完全成功，请检查具体状态', 'error');
                }
                
            } catch (error) {
                result += log(`❌ 测试失败: ${error.message}`, 'error');
                console.error(error);
            }
            
            resultDiv.innerHTML = result;
        }

        function testFullIntegration() {
            const resultDiv = document.getElementById('integrationResult');
            let result = '';
            
            result += log('🔄 开始完整集成测试...', 'info');
            
            // 步骤1: 系统检查
            result += log('步骤1: 系统检查', 'info');
            testSystemInit();
            
            setTimeout(() => {
                // 步骤2: 创建故事
                result += log('步骤2: 创建测试故事', 'info');
                createTestStory();
                
                setTimeout(() => {
                    // 步骤3: 启动番茄钟
                    result += log('步骤3: 启动番茄钟', 'info');
                    testDirectPomodoroStart();
                    
                    setTimeout(() => {
                        // 步骤4: 验证集成
                        result += log('步骤4: 验证系统集成', 'info');
                        
                        if (window.dailyStoriesManager && window.app && window.app.pomodoroTimer) {
                            const storiesRef = window.app.pomodoroTimer.dailyStories;
                            const pomodoroRef = window.dailyStoriesManager.pomodoroTimer;
                            
                            result += log(`故事→番茄钟引用: ${storiesRef ? '✅ 正常' : '❌ 缺失'}`, storiesRef ? 'success' : 'error');
                            result += log(`番茄钟→故事引用: ${pomodoroRef ? '✅ 正常' : '❌ 缺失'}`, pomodoroRef ? 'success' : 'error');
                            
                            if (storiesRef && pomodoroRef) {
                                result += log('🎉 完整集成测试成功！', 'success');
                            } else {
                                result += log('⚠️ 系统引用可能存在问题', 'error');
                            }
                        }
                        
                        resultDiv.innerHTML = result;
                    }, 500);
                }, 500);
            }, 500);
        }
        
        // 页面加载完成后自动运行初始化测试
        window.addEventListener('load', () => {
            setTimeout(() => {
                testSystemInit();
            }, 1000);
        });
    </script>
</body>
</html>
